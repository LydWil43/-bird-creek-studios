<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bird Creek Studios — Ideas Bank</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Jost:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --white:       #ffffff;
    --off-white:   #f7f8f6;
    --paper:       #f2f4f0;
    --ink:         #1c2018;
    --ink-mid:     #3a3f35;
    --ink-light:   #6b7265;
    --rule:        #d8ddd4;
    --rule-light:  #eaeee7;
    --sage:        #5a7a5e;
    --sage-light:  #7a9e7e;
    --sage-pale:   #dce8dc;
    --blue:        #4a6e7e;
    --blue-light:  #6a8e9e;
    --blue-pale:   #d8e8ee;
    --stone:       #8a8a7e;
    --stone-pale:  #e8e8e2;
    --blush:       #c4a882;
    --blush-pale:  #f0e8dc;
    --col-reels:   #5a7a5e;
    --col-posts:   #4a6e7e;
    --col-booth:   #8a7a5e;
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: var(–white);
font-family: ‘Jost’, sans-serif;
color: var(–ink);
min-height: 100vh;
}

.top-rule {
height: 3px;
background: linear-gradient(90deg, var(–sage) 0%, var(–blue) 50%, var(–sage-light) 100%);
}

.masthead {
padding: 48px 64px 0;
border-bottom: 1px solid var(–rule);
}
.masthead-inner {
display: grid;
grid-template-columns: 1fr auto;
align-items: end;
padding-bottom: 28px;
gap: 24px;
}
.masthead-kicker {
font-family: ‘DM Mono’, monospace;
font-size: 0.62rem;
letter-spacing: 0.22em;
text-transform: uppercase;
color: var(–sage);
margin-bottom: 10px;
}
.masthead h1 {
font-family: ‘Libre Baskerville’, serif;
font-size: clamp(2.4rem, 5vw, 4.2rem);
font-weight: 400;
letter-spacing: -0.03em;
line-height: 0.95;
color: var(–ink);
}
.masthead h1 em { font-style: italic; color: var(–sage); }
.masthead-meta {
text-align: right;
font-family: ‘DM Mono’, monospace;
font-size: 0.6rem;
color: var(–stone);
line-height: 2;
letter-spacing: 0.06em;
}
.masthead-date {
font-family: ‘DM Mono’, monospace;
font-size: 0.6rem;
color: var(–stone);
letter-spacing: 0.1em;
padding-top: 12px;
padding-bottom: 16px;
border-top: 1px solid var(–rule-light);
display: flex;
justify-content: space-between;
align-items: center;
}

.section-nav {
display: flex;
padding: 0 64px;
background: var(–white);
border-bottom: 1px solid var(–rule);
overflow-x: auto;
position: sticky;
top: 0;
z-index: 50;
}
.section-nav button {
background: none;
border: none;
border-bottom: 2px solid transparent;
padding: 14px 24px;
font-family: ‘DM Mono’, monospace;
font-size: 0.62rem;
letter-spacing: 0.16em;
text-transform: uppercase;
color: var(–stone);
cursor: pointer;
transition: color 0.2s, border-color 0.2s;
white-space: nowrap;
margin-bottom: -1px;
}
.section-nav button:hover { color: var(–ink); }
.section-nav button.active { color: var(–sage); border-bottom-color: var(–sage); }

main { padding: 48px 64px 96px; }
.section-panel { display: none; }
.section-panel.active { display: block; }

.section-header {
display: grid;
grid-template-columns: 1fr auto auto;
align-items: baseline;
gap: 16px;
margin-bottom: 36px;
padding-bottom: 16px;
border-bottom: 2px solid var(–ink);
}
.section-header h2 {
font-family: ‘Libre Baskerville’, serif;
font-size: 2rem;
font-weight: 400;
font-style: italic;
color: var(–ink);
letter-spacing: -0.02em;
}
.section-header .count {
font-family: ‘DM Mono’, monospace;
font-size: 0.6rem;
color: var(–stone);
letter-spacing: 0.1em;
}
.add-btn {
background: none;
border: 1px solid var(–rule);
color: var(–sage);
font-family: ‘DM Mono’, monospace;
font-size: 0.6rem;
letter-spacing: 0.14em;
text-transform: uppercase;
padding: 7px 16px;
cursor: pointer;
transition: all 0.2s;
}
.add-btn:hover { background: var(–sage-pale); border-color: var(–sage); }

.social-layout {
display: grid;
grid-template-columns: 1fr 1fr 1fr;
gap: 0;
align-items: start;
border: 1px solid var(–rule);
}
.social-col {
border-right: 1px solid var(–rule);
padding: 24px;
}
.social-col:last-child { border-right: none; }

.social-col-header {
display: flex;
align-items: center;
gap: 8px;
margin-bottom: 20px;
padding-bottom: 12px;
border-bottom: 1px solid var(–rule);
}
.social-col:nth-child(1) .social-col-header { border-bottom-color: var(–col-reels); }
.social-col:nth-child(2) .social-col-header { border-bottom-color: var(–col-posts); }
.social-col:nth-child(3) .social-col-header { border-bottom-color: var(–col-booth); }

.social-col-header h3 {
font-family: ‘Libre Baskerville’, serif;
font-size: 1rem;
font-style: italic;
font-weight: 400;
color: var(–ink);
}
.col-accent { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.reels-accent { background: var(–col-reels); }
.posts-accent { background: var(–col-posts); }
.booth-accent { background: var(–col-booth); }

.social-col-header .col-count {
font-family: ‘DM Mono’, monospace;
font-size: 0.58rem;
color: var(–stone);
margin-left: auto;
}
.col-add-btn {
background: none; border: none;
font-size: 1.1rem; color: var(–stone);
cursor: pointer; padding: 0 4px;
line-height: 1; transition: color 0.2s;
}
.col-add-btn:hover { color: var(–sage); }

.board { columns: 3 220px; column-gap: 16px; }
.social-col .board { columns: 1; }

.card {
break-inside: avoid;
margin-bottom: 16px;
background: var(–white);
border: 1px solid var(–rule);
transition: box-shadow 0.25s ease;
animation: fadeUp 0.4s ease both;
position: relative;
}
.card:hover { box-shadow: 0 4px 24px rgba(28,32,24,0.08); }
@keyframes fadeUp {
from { opacity: 0; transform: translateY(10px); }
to   { opacity: 1; transform: translateY(0); }
}
.card:nth-child(1){animation-delay:.03s}.card:nth-child(2){animation-delay:.06s}
.card:nth-child(3){animation-delay:.09s}.card:nth-child(4){animation-delay:.12s}
.card:nth-child(5){animation-delay:.15s}.card:nth-child(6){animation-delay:.18s}

.card-delete {
position: absolute; top: 8px; right: 8px;
background: rgba(255,255,255,0.92);
border: 1px solid var(–rule);
color: var(–stone);
font-size: 0.58rem;
width: 20px; height: 20px;
display: flex; align-items: center; justify-content: center;
cursor: pointer; opacity: 0;
transition: opacity 0.2s, color 0.2s; z-index: 10;
}
.card:hover .card-delete { opacity: 1; }
.card-delete:hover { color: #c04040; background: #fff0f0; border-color: #c04040; }

.card-image-area {
width: 100%; aspect-ratio: 3/2;
position: relative; overflow: hidden;
border-bottom: 1px solid var(–rule-light);
cursor: pointer; background: var(–paper);
}
.card-image-area img {
width: 100%; height: 100%;
object-fit: cover; display: block;
transition: transform 0.4s ease;
}
.card:hover .card-image-area img { transform: scale(1.03); }
.card-image-placeholder {
width: 100%; height: 100%;
display: flex; flex-direction: column;
align-items: center; justify-content: center;
gap: 6px; transition: background 0.2s;
}
.card-image-area:hover .card-image-placeholder { background: var(–sage-pale); }
.card-image-placeholder .plus { font-size: 1.2rem; color: var(–rule); transition: color 0.2s; }
.card-image-area:hover .card-image-placeholder .plus { color: var(–sage); }
.card-image-placeholder .ph-label {
font-family: ‘DM Mono’, monospace;
font-size: 0.55rem; letter-spacing: 0.14em;
color: var(–stone); text-transform: uppercase;
}
.card-image-area.has-image .card-image-placeholder { display: none; }

.card-body { padding: 14px 16px 16px; }
.card-status-row { display: flex; align-items: center; gap: 5px; margin-bottom: 8px; flex-wrap: wrap; }

.tag {
font-family: ‘DM Mono’, monospace;
font-size: 0.54rem; letter-spacing: 0.1em;
text-transform: uppercase; padding: 2px 6px; border: 1px solid;
}
.tag-ready      { background: #edf4ed; color: var(–sage);    border-color: var(–sage-pale); }
.tag-developing { background: var(–blue-pale); color: var(–blue); border-color: #b8d4de; }
.tag-seed       { background: var(–stone-pale); color: var(–stone); border-color: #d4d4cc; }
.tag-market     { background: var(–blush-pale); color: #8a6040; border-color: #ddd0bc; }
.tag-wholesale  { background: var(–sage-pale); color: var(–sage); border-color: #c0d8c0; }
.tag-seasonal   { background: var(–blue-pale); color: var(–blue); border-color: #b8d4de; }
.tag-branded    { background: #f0ecf8; color: #7060a0; border-color: #d8d0ec; }

.card-title {
font-family: ‘Libre Baskerville’, serif;
font-size: 0.95rem; font-weight: 400;
color: var(–ink); line-height: 1.4; margin-bottom: 6px;
}
.card-notes {
font-family: ‘Jost’, sans-serif;
font-size: 0.78rem; font-weight: 300;
color: var(–ink-light); line-height: 1.65;
}
.card-link-row {
margin-top: 10px; padding-top: 10px;
border-top: 1px solid var(–rule-light);
display: flex; align-items: center; gap: 6px;
}
.card-link-text {
flex: 1; font-family: ‘DM Mono’, monospace;
font-size: 0.58rem; color: var(–blue-light);
overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.card-link-go {
font-family: ‘DM Mono’, monospace; font-size: 0.58rem;
color: var(–stone); background: none; border: none;
cursor: pointer; padding: 2px 4px; transition: color 0.2s; text-decoration: none;
}
.card-link-go:hover { color: var(–blue); }

.loading-state {
display: flex; align-items: center; justify-content: center;
padding: 48px 0; gap: 6px;
}
.loading-dot {
width: 4px; height: 4px; background: var(–rule);
border-radius: 50%; animation: pulse 1.2s ease-in-out infinite;
}
.loading-dot:nth-child(2){animation-delay:.2s}.loading-dot:nth-child(3){animation-delay:.4s}
@keyframes pulse {
0%,80%,100%{opacity:.2;transform:scale(.8)} 40%{opacity:1;transform:scale(1.2)}
}
.empty-state {
padding: 48px 0; font-family: ‘DM Mono’, monospace;
font-size: 0.6rem; color: var(–rule);
letter-spacing: 0.14em; text-transform: uppercase; text-align: center;
}

.modal-overlay {
position: fixed; inset: 0;
background: rgba(28,32,24,0.45);
display: none; align-items: center; justify-content: center;
z-index: 100; backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }
.modal {
background: var(–white);
border: 1px solid var(–rule);
padding: 40px; width: 520px; max-width: 94vw;
max-height: 92vh; overflow-y: auto;
animation: fadeUp 0.25s ease;
box-shadow: 0 20px 60px rgba(28,32,24,0.12);
}
.modal-top-rule {
height: 2px;
background: linear-gradient(90deg, var(–sage), var(–blue));
margin: -40px -40px 32px;
}
.modal h3 {
font-family: ‘Libre Baskerville’, serif;
font-size: 1.4rem; font-style: italic;
font-weight: 400; color: var(–ink); margin-bottom: 24px;
}
.modal label {
display: block; font-family: ‘DM Mono’, monospace;
font-size: 0.58rem; letter-spacing: 0.16em;
text-transform: uppercase; color: var(–stone);
margin-bottom: 5px; margin-top: 16px;
}
.modal input, .modal textarea, .modal select {
width: 100%; background: var(–off-white);
border: 1px solid var(–rule); color: var(–ink);
font-family: ‘Jost’, sans-serif; font-size: 0.92rem;
padding: 9px 12px; outline: none;
transition: border-color 0.2s, background 0.2s; resize: none;
}
.modal input:focus, .modal textarea:focus, .modal select:focus {
border-color: var(–sage); background: var(–white);
}
.modal select option { background: var(–white); }
.modal-actions { display: flex; gap: 10px; margin-top: 28px; justify-content: flex-end; }
.modal-actions button {
font-family: ‘DM Mono’, monospace; font-size: 0.62rem;
letter-spacing: 0.14em; text-transform: uppercase;
padding: 10px 22px; border: 1px solid var(–rule);
background: none; color: var(–sage); cursor: pointer; transition: all 0.2s;
}
.modal-actions button.primary { background: var(–sage); color: var(–white); border-color: var(–sage); }
.modal-actions button.primary:hover { background: var(–sage-light); border-color: var(–sage-light); }
.modal-actions button.cancel { color: var(–stone); }
.modal-actions button.cancel:hover { background: var(–paper); }
.modal-actions button:disabled { opacity: 0.4; cursor: not-allowed; }

footer {
padding: 20px 64px; border-top: 1px solid var(–rule);
display: flex; justify-content: space-between; align-items: center;
background: var(–off-white);
}
.footer-brand { font-family: ‘Libre Baskerville’, serif; font-style: italic; font-size: 0.85rem; color: var(–ink-light); }
.footer-note { font-family: ‘DM Mono’, monospace; font-size: 0.56rem; color: var(–stone); letter-spacing: 0.1em; }

.toast {
position: fixed; bottom: 28px; left: 50%;
transform: translateX(-50%) translateY(16px);
background: var(–ink); color: var(–white);
font-family: ‘DM Mono’, monospace; font-size: 0.62rem;
letter-spacing: 0.1em; padding: 10px 20px;
opacity: 0; transition: all 0.3s ease; z-index: 200; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 960px) {
.social-layout { grid-template-columns: 1fr; }
.social-col { border-right: none; border-bottom: 1px solid var(–rule); }
.social-col:last-child { border-bottom: none; }
}
@media (max-width: 680px) {
.masthead, main, .section-nav, footer { padding-left: 24px; padding-right: 24px; }
.masthead-inner { grid-template-columns: 1fr; }
.masthead-meta { text-align: left; }
.board { columns: 1; }
.modal { padding: 28px 24px; }
.modal-top-rule { margin: -28px -24px 24px; }
}
</style>

</head>
<body>

<div class="top-rule"></div>

<div class="masthead">
  <div class="masthead-inner">
    <div>
      <div class="masthead-kicker">Ideas &amp; Inspiration Bank</div>
      <h1>Bird Creek <em>Studios</em></h1>
    </div>
    <div class="masthead-meta">
      Tap ＋ to add ideas<br>
      Tap image to update photo<br>
      Ask Claude to make changes
    </div>
  </div>
  <div class="masthead-date">
    <span id="today-date"></span>
    <span>Vol. I</span>
  </div>
</div>

<nav class="section-nav">
  <button class="active" onclick="showSection('social', this)">✦ Social Media</button>
  <button onclick="showSection('products', this)">○ Product Ideas</button>
  <button onclick="showSection('branded', this)">◇ Branded Products</button>
  <button onclick="showSection('seeds', this)">◌ Seed Ideas</button>
</nav>

<main>

  <div class="section-panel active" id="panel-social">
    <div class="section-header">
      <h2>Social Media</h2>
      <span class="count" id="count-social"></span>
    </div>
    <div class="social-layout">
      <div class="social-col">
        <div class="social-col-header">
          <span class="col-accent reels-accent"></span>
          <h3>Reels</h3>
          <span class="col-count" id="count-reels"></span>
          <button class="col-add-btn" onclick="openModal('reels')">＋</button>
        </div>
        <div class="board" id="board-reels"><div class="loading-state"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div></div>
      </div>
      <div class="social-col">
        <div class="social-col-header">
          <span class="col-accent posts-accent"></span>
          <h3>Posts</h3>
          <span class="col-count" id="count-posts"></span>
          <button class="col-add-btn" onclick="openModal('posts')">＋</button>
        </div>
        <div class="board" id="board-posts"><div class="loading-state"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div></div>
      </div>
      <div class="social-col">
        <div class="social-col-header">
          <span class="col-accent booth-accent"></span>
          <h3>Booth Display</h3>
          <span class="col-count" id="count-booth"></span>
          <button class="col-add-btn" onclick="openModal('booth')">＋</button>
        </div>
        <div class="board" id="board-booth"><div class="loading-state"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div></div>
      </div>
    </div>
  </div>

  <div class="section-panel" id="panel-products">
    <div class="section-header">
      <h2>Product Ideas</h2>
      <span class="count" id="count-products"></span>
      <button class="add-btn" onclick="openModal('products')">+ Add Idea</button>
    </div>
    <div class="board" id="board-products"><div class="loading-state"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div></div>
  </div>

  <div class="section-panel" id="panel-branded">
    <div class="section-header">
      <h2>Branded Product Ideas</h2>
      <span class="count" id="count-branded"></span>
      <button class="add-btn" onclick="openModal('branded')">+ Add Idea</button>
    </div>
    <div class="board" id="board-branded"><div class="loading-state"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div></div>
  </div>

  <div class="section-panel" id="panel-seeds">
    <div class="section-header">
      <h2>Seed Ideas</h2>
      <span class="count" id="count-seeds"></span>
      <button class="add-btn" onclick="openModal('seeds')">+ Add Idea</button>
    </div>
    <div class="board" id="board-seeds"><div class="loading-state"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div></div>
  </div>

</main>

<footer>
  <div class="footer-brand">Bird Creek Studios</div>
  <div class="footer-note">Connected · Changes save automatically</div>
</footer>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-top-rule"></div>
    <h3 id="modal-title">New Idea</h3>
    <label>Title</label>
    <input type="text" id="m-title" placeholder="Give it a name…">
    <label>Notes</label>
    <textarea id="m-notes" rows="3" placeholder="Context, details, inspiration…"></textarea>
    <label>Image URL</label>
    <input type="url" id="m-image" placeholder="Paste Cloudinary or direct image URL…">
    <label>Link URL</label>
    <input type="url" id="m-link" placeholder="Paste inspiration link…">
    <label>Status</label>
    <select id="m-status">
      <option value="ready">Ready</option>
      <option value="developing" selected>Developing</option>
      <option value="seed">Seed</option>
    </select>
    <label>Tags (hold Ctrl/Cmd for multiple)</label>
    <select id="m-tags" multiple style="height:84px">
      <option value="market">Market</option>
      <option value="wholesale">Wholesale</option>
      <option value="branded">Branded</option>
      <option value="spring">Spring</option>
      <option value="summer">Summer</option>
      <option value="fall">Fall</option>
      <option value="winter">Winter</option>
    </select>
    <div class="modal-actions">
      <button class="cancel" onclick="closeModal()">Cancel</button>
      <button class="primary" id="modal-save-btn" onclick="saveCard()">Add to Board</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const now = new Date();
  document.getElementById('today-date').textContent = months[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear();

  const { createClient } = supabase;
  const sb = createClient(
    'https://bsbpsxvcsnhiujwnynxh.supabase.co',
    'sb_publishable_B0qQfh6RTyYMK4jiL-B14A_y9Zt_4xL'
  );

  let currentSection = 'reels';
  const SECTIONS = ['reels','posts','booth','products','branded','seeds'];

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  async function loadSection(section) {
    const board = document.getElementById('board-' + section);
    if (!board) return;
    const { data, error } = await sb
      .from('cards').select('*').eq('section', section)
      .order('sort_order', { ascending: true })
      .order('created_at', { ascending: true });
    if (error) { board.innerHTML = `<div class="empty-state">Error — ${error.message}</div>`; return; }
    board.innerHTML = (!data || data.length === 0)
      ? `<div class="empty-state">No ideas yet — tap ＋ to add one</div>`
      : data.map(renderCard).join('');
    updateCounts();
  }

  async function loadAll() { for (const s of SECTIONS) await loadSection(s); }

  function renderCard(card) {
    const tags = card.tags ? card.tags.split(',').filter(Boolean) : [];
    const statusMap = { ready:['Ready','tag-ready'], developing:['Developing','tag-developing'], seed:['Seed','tag-seed'] };
    const tagLabelMap = {
      market:['Market','tag-market'], wholesale:['Wholesale','tag-wholesale'], branded:['Branded','tag-branded'],
      spring:['Spring','tag-seasonal'], summer:['Summer','tag-seasonal'], fall:['Fall','tag-seasonal'], winter:['Winter','tag-seasonal'],
    };
    const [sLabel, sClass] = statusMap[card.status] || ['Developing','tag-developing'];
    const tagHTML = `<span class="tag ${sClass}">${sLabel}</span>` +
      tags.map(t => { const [l,c] = tagLabelMap[t]||[t,'tag-seed']; return `<span class="tag ${c}">${l}</span>`; }).join('');

    const imageHTML = card.image_url
      ? `<div class="card-image-area has-image" onclick="editCardImage(${card.id},'${escAttr(card.image_url)}')">
           <img src="${escAttr(card.image_url)}" alt="${escAttr(card.title)}" onerror="this.parentElement.classList.remove('has-image')">
           <div class="card-image-placeholder"><span class="plus">＋</span><span class="ph-label">Update photo</span></div>
         </div>`
      : `<div class="card-image-area" onclick="editCardImage(${card.id},'')">
           <div class="card-image-placeholder"><span class="plus">＋</span><span class="ph-label">Add photo</span></div>
         </div>`;

    const linkHTML = card.link_url
      ? `<div class="card-link-row">
           <span class="card-link-text">${escHtml(card.link_url)}</span>
           <a class="card-link-go" href="${escAttr(card.link_url)}" target="_blank" rel="noopener">↗</a>
         </div>` : '';

    return `<div class="card" data-id="${card.id}">
      <button class="card-delete" onclick="deleteCard(${card.id},'${escAttr(card.section)}')" title="Delete">✕</button>
      ${imageHTML}
      <div class="card-body">
        <div class="card-status-row">${tagHTML}</div>
        <div class="card-title">${escHtml(card.title)}</div>
        ${card.notes ? `<div class="card-notes">${escHtml(card.notes)}</div>` : ''}
        ${linkHTML}
      </div>
    </div>`;
  }

  function escHtml(str) { if(!str)return''; return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function escAttr(str) { if(!str)return''; return str.replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

  async function editCardImage(id, current) {
    const url = prompt('Paste a Cloudinary or direct image URL:', current || '');
    if (url === null) return;
    const { error } = await sb.from('cards').update({ image_url: url.trim() || null }).eq('id', id);
    if (error) { showToast('Error saving image'); return; }
    const card = document.querySelector(`.card[data-id="${id}"]`);
    if (card) await loadSection(card.closest('.board').id.replace('board-',''));
    showToast('Image updated');
  }

  async function deleteCard(id, section) {
    if (!confirm('Delete this card?')) return;
    const { error } = await sb.from('cards').delete().eq('id', id);
    if (error) { showToast('Error deleting'); return; }
    await loadSection(section);
    showToast('Card deleted');
  }

  function openModal(target) {
    currentSection = target;
    const labels = { reels:'New Reel Idea', posts:'New Post Idea', booth:'New Booth Idea', products:'New Product Idea', branded:'New Branded Idea', seeds:'New Seed Idea' };
    document.getElementById('modal-title').textContent = labels[target] || 'New Idea';
    document.getElementById('modal').classList.add('open');
    document.getElementById('m-title').focus();
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    ['m-title','m-notes','m-image','m-link'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('m-status').value = 'developing';
    Array.from(document.getElementById('m-tags').options).forEach(o => o.selected = false);
  }

  async function saveCard() {
    const title = document.getElementById('m-title').value.trim();
    if (!title) { document.getElementById('m-title').focus(); return; }
    const btn = document.getElementById('modal-save-btn');
    btn.disabled = true; btn.textContent = 'Saving…';
    const tags = Array.from(document.getElementById('m-tags').selectedOptions).map(o => o.value).join(',');
    const { error } = await sb.from('cards').insert({
      section: currentSection, title,
      notes: document.getElementById('m-notes').value.trim() || null,
      image_url: document.getElementById('m-image').value.trim() || null,
      link_url: document.getElementById('m-link').value.trim() || null,
      status: document.getElementById('m-status').value,
      tags, created_at: new Date().toISOString()
    });
    btn.disabled = false; btn.textContent = 'Add to Board';
    if (error) { showToast('Error — ' + error.message); return; }
    closeModal();
    await loadSection(currentSection);
    showToast('Card added!');
  }

  function showSection(name, btn) {
    document.querySelectorAll('.section-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.section-nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');
    btn.classList.add('active');
  }

  function updateCounts() {
    ['products','branded','seeds'].forEach(s => {
      const n = document.getElementById('board-'+s)?.querySelectorAll('.card').length||0;
      const el = document.getElementById('count-'+s);
      if(el) el.textContent = n+(n===1?' idea':' ideas');
    });
    ['reels','posts','booth'].forEach(c => {
      const n = document.getElementById('board-'+c)?.querySelectorAll('.card').length||0;
      const el = document.getElementById('count-'+c);
      if(el) el.textContent = n;
    });
    const total = ['reels','posts','booth'].reduce((a,c)=>a+(document.getElementById('board-'+c)?.querySelectorAll('.card').length||0),0);
    const el = document.getElementById('count-social');
    if(el) el.textContent = total+(total===1?' idea':' ideas');
  }

  document.getElementById('modal').addEventListener('click', function(e) { if(e.target===this) closeModal(); });
  document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
  loadAll();
</script>

</body>
</html>
